<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Workflow Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F0F4F8; color: #111827; min-height: 100vh; }

    /* Auth */
    #auth-page { min-height: 100vh; background: #1B5E7B; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-box { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; }
    .auth-logo { font-size: 52px; text-align: center; margin-bottom: 12px; }
    .auth-title { font-size: 24px; font-weight: 700; color: #1B5E7B; text-align: center; margin-bottom: 4px; }
    .auth-sub { font-size: 14px; color: #6B7280; text-align: center; margin-bottom: 28px; }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid #E5E7EB; border-radius: 10px; overflow: hidden; }
    .auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; color: #6B7280; background: #F9FAFB; border: none; transition: all 0.2s; }
    .auth-tab.active { background: #1B5E7B; color: white; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #111827; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 12px 16px; border: 1px solid #E5E7EB; border-radius: 10px; font-size: 15px; color: #111827; background: #F9FAFB; outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group select:focus { border-color: #1B5E7B; }
    .password-field { position: relative; }
    .password-field input { padding-right: 88px; }
    .password-toggle { position: absolute; top: 50%; right: 10px; transform: translateY(-50%); border: none; background: transparent; color: #1B5E7B; font-size: 12px; font-weight: 700; cursor: pointer; padding: 4px 6px; }
    .btn { width: 100%; padding: 14px; background: #1B5E7B; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #F3F4F6; color: #374151; }
    .btn-danger { background: #FEE2E2; color: #B91C1C; }
    .error-msg { color: #B91C1C; font-size: 13px; margin-top: 12px; text-align: center; }
    .success-msg { color: #2E7D52; font-size: 13px; margin-top: 12px; text-align: center; }

    /* Layout */
    #app-page { display: none; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: #1B5E7B; padding: 24px 0; position: fixed; height: 100vh; display: flex; flex-direction: column; overflow-y: auto; }
    .sidebar-logo { padding: 0 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.15); margin-bottom: 16px; }
    .sidebar-logo-title { font-size: 16px; font-weight: 700; color: white; margin-top: 8px; }
    .sidebar-logo-sub { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
    .nav-section { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.8px; padding: 12px 24px 4px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 24px; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
    .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
    .nav-item.active { background: rgba(255,255,255,0.15); color: white; border-left-color: white; }
    .nav-icon { font-size: 16px; }
    .sidebar-bottom { margin-top: auto; padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.15); }
    .user-info { color: white; margin-bottom: 10px; }
    .user-name { font-size: 14px; font-weight: 600; }
    .user-role { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-top: 2px; }
    .logout-btn { width: 100%; padding: 8px; background: rgba(255,255,255,0.15); color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; transition: background 0.2s; }
    .logout-btn:hover { background: rgba(255,255,255,0.25); }
    .main { margin-left: 240px; flex: 1; padding: 32px; }
    .page-title { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 24px; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: white; border-radius: 12px; padding: 20px; border-left: 4px solid; box-shadow: 0 1px 4px rgba(0,0,0,0.06); cursor: pointer; transition: transform 0.1s; }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-value { font-size: 36px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
    .stat-label { font-size: 13px; color: #6B7280; }

    /* Cards */
    .content-card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; margin-bottom: 20px; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid #E5E7EB; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .card-header-title { font-size: 16px; font-weight: 600; }
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { padding: 5px 14px; border: 1px solid #E5E7EB; border-radius: 999px; background: white; font-size: 12px; cursor: pointer; color: #6B7280; transition: all 0.2s; text-transform: capitalize; }
    .filter-btn.active { background: #1B5E7B; border-color: #1B5E7B; color: white; }
    .filter-btn:hover:not(.active) { border-color: #1B5E7B; color: #1B5E7B; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 20px; font-size: 11px; font-weight: 600; color: #6B7280; text-transform: uppercase; letter-spacing: 0.5px; background: #F9FAFB; border-bottom: 1px solid #E5E7EB; }
    td { padding: 13px 20px; font-size: 14px; border-bottom: 1px solid #F3F4F6; color: #111827; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #F9FAFB; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; text-transform: capitalize; }
    .action-btn { padding: 5px 12px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .action-btn:hover { opacity: 0.8; }
    .btn-row { display: flex; gap: 6px; }

    /* Beds grid */
    .beds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 20px; }
    .bed-card { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 10px; padding: 14px; transition: border-color 0.2s; }
    .bed-card:hover { border-color: #1B5E7B; }
    .bed-number { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .bed-meta { font-size: 11px; color: #6B7280; margin-top: 2px; }
    .bed-patient { font-size: 11px; color: #1B5E7B; font-weight: 600; margin-top: 6px; }

    /* Form panel */
    .form-panel { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border-left: 4px solid #1B5E7B; }
    .form-panel-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: #111827; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .form-actions { display: flex; gap: 10px; margin-top: 20px; }
    .form-actions .btn { width: auto; padding: 10px 24px; margin-top: 0; }

    /* Staff cards */
    .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; padding: 20px; }
    .staff-card { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 10px; padding: 16px; }
    .staff-avatar { width: 44px; height: 44px; border-radius: 50%; background: #1B5E7B; color: white; font-size: 18px; font-weight: 800; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
    .staff-name { font-size: 15px; font-weight: 600; }
    .staff-dept { font-size: 12px; color: #6B7280; margin-top: 2px; }

    /* Shift */
    .shift-card { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 10px; padding: 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .shift-info { flex: 1; }
    .shift-name { font-size: 14px; font-weight: 600; }
    .shift-meta { font-size: 12px; color: #6B7280; margin-top: 2px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal { background: white; border-radius: 16px; padding: 28px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .modal-actions .btn { width: auto; padding: 10px 20px; margin-top: 0; }

    /* Misc */
    .loading { text-align: center; padding: 40px; color: #6B7280; font-size: 14px; }
    .empty { text-align: center; padding: 40px; color: #9CA3AF; font-size: 14px; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 11px; background: #F3F4F6; color: #6B7280; border: 1px solid #E5E7EB; margin-right: 4px; }
    .divider { border: none; border-top: 1px solid #E5E7EB; margin: 16px 0; }

    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-logo-title, .sidebar-logo-sub, .nav-item span:last-child, .nav-section, .sidebar-bottom .user-info { display: none; }
      .main { margin-left: 60px; padding: 16px; }
      .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="auth-page">
  <div class="auth-box">
    <div class="auth-logo">🏥</div>
    <div class="auth-title">Hospital Workflow</div>
    <div class="auth-sub">Staff Portal</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Register Staff</button>
    </div>

    <!-- Login form -->
    <div id="login-form">
      <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="you@hospital.com" /></div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-field">
          <input type="password" id="login-password" placeholder="••••••••" />
          <button type="button" class="password-toggle" onclick="togglePassword('login-password', this)">Show</button>
        </div>
      </div>
      <div id="login-error" class="error-msg" style="display:none"></div>
      <button class="btn" id="login-btn" onclick="login()">Sign In</button>
      <p style="font-size:12px;color:#9CA3AF;text-align:center;margin-top:12px">Demo: admin@hospital.com / password123</p>
    </div>

    <!-- Register form -->
    <div id="register-form" style="display:none">
      <div class="form-grid">
        <div class="form-group"><label>Full Name *</label><input type="text" id="reg-name" placeholder="Dr. Jane Smith" /></div>
        <div class="form-group"><label>Email *</label><input type="email" id="reg-email" placeholder="jane@hospital.com" /></div>
        <div class="form-group">
          <label>Password *</label>
          <div class="password-field">
            <input type="password" id="reg-password" placeholder="Min 6 characters" />
            <button type="button" class="password-toggle" onclick="togglePassword('reg-password', this)">Show</button>
          </div>
        </div>
        <div class="form-group"><label>Role *</label>
          <select id="reg-role">
            <option value="nurse">Nurse</option>
            <option value="doctor">Doctor</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1"><label>Department</label><input type="text" id="reg-dept" placeholder="Cardiology" /></div>
      </div>
      <div id="reg-error" class="error-msg" style="display:none"></div>
      <div id="reg-success" class="success-msg" style="display:none"></div>
      <button class="btn" onclick="registerStaff()">Create Account</button>
    </div>
  </div>
</div>

<!-- APP PAGE -->
<div id="app-page">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-logo">
        <div style="font-size:28px">🏥</div>
        <div class="sidebar-logo-title">Hospital Tracker</div>
        <div class="sidebar-logo-sub">Staff Portal</div>
      </div>
      <div class="nav-section">Main</div>
      <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard"><span class="nav-icon">🏠</span><span>Dashboard</span></div>
      <div class="nav-section">Clinical</div>
      <div class="nav-item" onclick="showPage('patients')" id="nav-patients"><span class="nav-icon">🛏</span><span>Patients</span></div>
      <div class="nav-item" onclick="showPage('beds')" id="nav-beds"><span class="nav-icon">🗺</span><span>Beds</span></div>
      <div class="nav-item" onclick="showPage('tasks')" id="nav-tasks"><span class="nav-icon">📋</span><span>Tasks</span></div>
      <div class="nav-section">Staff</div>
      <div class="nav-item" onclick="showPage('staff')" id="nav-staff"><span class="nav-icon">👥</span><span>Staff</span></div>
      <div class="nav-item" onclick="showPage('shifts')" id="nav-shifts"><span class="nav-icon">🗓</span><span>Shifts</span></div>
      <div class="sidebar-bottom">
        <div class="user-info">
          <div class="user-name" id="sidebar-name">—</div>
          <div class="user-role" id="sidebar-role">—</div>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="main" id="main-content">
      <div class="loading">Loading...</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-title" id="modal-title">Modal</div>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script src="./js/shared.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/pages.js"></script>
<script src="./js/main.js"></script>
</body>
</html>
